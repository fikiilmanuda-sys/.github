- name: Fix Launcher Icons
  run: |
    cd project_raw/BaseApk
    sudo apt-get install -y imagemagick
    for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
      case $dpi in
        mdpi) size=48 ;;
        hdpi) size=72 ;;
        xhdpi) size=96 ;;
        xxhdpi) size=144 ;;
        xxxhdpi) size=192 ;;
      esac
      dir="android/app/src/main/res/mipmap-${dpi}"
      mkdir -p "$dir"
      convert -size ${size}x${size} xc:#1a73e8 \
        -fill white -draw "roundrectangle 8,8,$((size-8)),$((size-8)),12,12" \
        "${dir}/ic_launcher.png"
    done
